# Render Blueprint — https://render.com/docs/infrastructure-as-code
# Deploy: Dashboard → New → Blueprint → connect this repo → review → Deploy Blueprint
#
# Schema: Free web tier has no pre-deploy hook — migrations run in `buildCommand` after `npm install`.
# `prisma` is a runtime dependency so the CLI is always installed.
# After first successful deploy, open the web service Shell once and run:
#   npm run create-admin:prod
# Set NEXTAUTH_URL in the dashboard to https://<service>.onrender.com (no trailing slash).
# Optional env: ADMIN_EMAIL, ADMIN_PASSWORD (see .env.example).

databases:
  - name: pgc-jobs-platform-db
    plan: free
    region: oregon

services:
  - type: web
    name: pgc-jobs-platform
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        fromDatabase:
          name: pgc-jobs-platform-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_TRUST_HOST
        value: "true"
      - key: AUTH_TRUST_HOST
        value: "true"
