# Render Blueprint — https://render.com/docs/infrastructure-as-code
# Deploy: Dashboard → New → Blueprint → connect this repo → review → Deploy Blueprint
#
# Schema: preDeployCommand runs `prisma migrate deploy` on each deploy.
# After first successful deploy, open the web service Shell once and run:
#   npm run create-admin:prod
# Optional env: ADMIN_EMAIL, ADMIN_PASSWORD (see .env.example).

databases:
  - name: pgc-jobs-platform-db
    plan: free

services:
  - type: web
    name: pgc-jobs-platform
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        fromDatabase:
          name: pgc-jobs-platform-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_TRUST_HOST
        value: "true"
