# fly.toml app configuration file generated for pgc-hr-system on 2026-02-17T20:38:59Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pgc-hr-system'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = "production"

# Release: push schema then ensure admin user exists (create-admin is idempotent).
[deploy]
  release_command = 'npx prisma db push --accept-data-loss && node scripts/create-admin.cjs'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
